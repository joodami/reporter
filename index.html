<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรายงานการให้บริการ - โรงเรียนพิมานพิทยาสรรค์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        :root { --primary-color: #1e3a8a; --secondary-color: #fdbb2d; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; margin: 0; }

        /* Banner Design */
        .header-banner {
            background: linear-gradient(135deg, var(--primary-color), #3b82f6);
            color: white; padding: 40px 20px; border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: -50px;
        }
        .header-banner h2 { 
            font-size: 1.7rem; font-weight: 700; line-height: 1.3; 
            max-width: 800px; margin: 0 auto 10px auto; word-wrap: break-word;
        }
        .school-logo { width: 90px; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3)); }
        
        /* Card Design */
        .main-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: white; padding: 30px; }
        .form-label { font-weight: 700; color: var(--primary-color); }
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #dee2e6; }
        .btn-preview { background-color: var(--secondary-color); color: #333; border: none; font-weight: 700; transition: 0.3s; }
        .btn-preview:hover { background-color: #e5a920; transform: translateY(-2px); }
        #imgPreview { width: 100%; max-height: 250px; object-fit: contain; display: none; margin-top: 15px; border-radius: 10px; border: 2px dashed #ddd; }

        /* --- แก้ไขเพื่อมือถือให้เห็นชื่อโรงเรียนชัดเจน --- */
        @media (max-width: 768px) {
            .header-banner { 
                padding: 30px 15px 90px 15px !important; /* เพิ่มพื้นที่ด้านล่างมากขึ้น */
                border-bottom-left-radius: 30px; 
                border-bottom-right-radius: 30px; 
            }
            .header-banner h2 { 
                font-size: 1.2rem; 
                margin-bottom: 8px !important;
            } 
            .header-banner .lead { 
                font-size: 1.05rem !important; 
                opacity: 1 !important; 
                font-weight: 400;
                margin-bottom: 0;
                display: block !important; /* บังคับให้แสดงผล */
            }
            .school-logo { width: 70px; }
            .main-card { 
                padding: 20px; 
                margin-top: -65px !important; /* ปรับจุดเริ่มต้นของการ์ดให้ต่ำลง ไม่ให้ทับชื่อ */
                position: relative;
                z-index: 10;
            }
            .modal-footer { flex-direction: column; gap: 10px; padding: 20px !important; }
            .modal-footer button { width: 100% !important; margin: 0 !important; padding: 12px; }
        }
    </style>
</head>
<body>

<div class="header-banner text-center">
    <img src="https://raw.githubusercontent.com/joodami/school-assets/main/logo.png" class="school-logo mb-3" alt="School Logo"> 
    <h2 class="fw-bold">ระบบรายงานการให้บริการ <br class="d-md-none"> การติดต่อราชการของประชาชน</h2>
    <p class="lead">โรงเรียนพิมานพิทยาสรรค์</p>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="main-card">
                <form id="reportForm">
                    <div class="mb-4 text-center"><span class="badge bg-primary px-3 py-2">กรอกข้อมูลรายงาน</span></div>
                    <div class="mb-3">
                        <label class="form-label">ชื่อผู้รายงาน</label>
                        <input type="text" id="name" class="form-control" placeholder="ระบุชื่อ-นามสกุล" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">วันเดือนปี</label>
                            <input type="date" id="reportDate" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">ผู้ให้บริการคนที่ (ตามคำสั่ง)</label>
                            <input type="number" id="reporterOrder" class="form-control" placeholder="ลำดับที่..." required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">รายงานการปฏิบัติหน้าที่</label>
                        <textarea id="detail" class="form-control" rows="5" placeholder="รายละเอียดการทำงาน..." required></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">แนบรูปภาพการปฏิบัติงาน</label>
                        <input type="file" id="imageInput" class="form-control" accept="image/*" required>
                        <img id="imgPreview">
                    </div>
                    <button type="button" class="btn btn-preview w-100 py-3 shadow-sm" onclick="showPreview()">🔍 ตรวจสอบข้อมูล (Preview)</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="previewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header border-0"><h5 class="modal-title fw-bold text-primary">ตรวจสอบความถูกต้อง</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body px-4">
                <div class="row">
                    <div class="col-md-6"><p class="preview-label">ชื่อผู้รายงาน:</p><p id="pName" class="preview-value text-dark fw-bold"></p></div>
                    <div class="col-md-3"><p class="preview-label">วันที่:</p><p id="pDate" class="preview-value"></p></div>
                    <div class="col-md-3"><p class="preview-label">ผู้ให้บริการคนที่:</p><p id="pOrder" class="preview-value"></p></div>
                </div>
                <p class="preview-label">รายงานการปฏิบัติหน้าที่:</p><p id="pDetail" class="preview-value border-start ps-3 py-1"></p>
                <p class="preview-label">รูปภาพแนบ:</p><img id="pImg" class="img-fluid rounded shadow-sm" style="max-height: 200px;">
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">แก้ไขข้อมูล</button>
                <button type="button" class="btn btn-primary" onclick="submitToGAS()">✅ ยืนยันและบันทึก</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyuPk3duuh1dvZ3dBxxEsNR1MD6Q-HKbfM1su0X0cLzS19XuG0UWNHQCEcrkhvh7mDn/exec"; 
    let base64Image = "";

    function resetForm() {
        document.getElementById('reportForm').reset();
        document.getElementById('imgPreview').style.display = 'none';
        base64Image = "";
    }

    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                base64Image = event.target.result;
                const img = document.getElementById('imgPreview');
                img.src = base64Image; img.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });

    function showPreview() {
        const name = document.getElementById('name').value;
        const date = document.getElementById('reportDate').value;
        const order = document.getElementById('reporterOrder').value;
        const detail = document.getElementById('detail').value;
        if(!name || !date || !order || !detail || !base64Image) {
            Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกข้อมูลและแนบรูปภาพค่ะ', 'warning'); return;
        }
        document.getElementById('pName').innerText = name;
        document.getElementById('pDate').innerText = date;
        document.getElementById('pOrder').innerText = order;
        document.getElementById('pDetail').innerText = detail;
        document.getElementById('pImg').src = base64Image;
        new bootstrap.Modal(document.getElementById('previewModal')).show();
    }

    async function submitToGAS() {
        bootstrap.Modal.getInstance(document.getElementById('previewModal')).hide();
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const payload = {
            name: document.getElementById('name').value,
            date: document.getElementById('reportDate').value,
            reporterOrder: document.getElementById('reporterOrder').value,
            detail: document.getElementById('detail').value,
            image: base64Image
        };
        try {
            const response = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await response.json();
            if (result.status === 'success') {
                resetForm();
                Swal.fire({
                    title: 'สำเร็จ!', text: 'บันทึกเรียบร้อยแล้วค่ะ', icon: 'success',
                    showCancelButton: true, confirmButtonText: '👁 ดูรายงาน', cancelButtonText: '📥 ดาวน์โหลด PDF',
                    confirmButtonColor: '#0dcaf0', cancelButtonColor: '#198754'
                }).then((res) => {
                    if (res.isConfirmed) window.open(result.viewUrl, '_blank');
                    else if (res.dismiss === Swal.DismissReason.cancel) window.location.href = result.pdfUrl;
                });
            } else { throw new Error(result.msg); }
        } catch (error) { Swal.fire('Error', error.message, 'error'); }
    }
</script>
</body>
</html>
